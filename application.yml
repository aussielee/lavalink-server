server:
  port: ${PORT:-2333}
  address: 0.0.0.0

spring:
  main:
    banner-mode: log

lavalink:
  server:
    password: "${LAVALINK_PASSWORD:-NoBakaPassing21@}"
    sources:
      youtube: true
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      nico: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    trackStuckThresholdMs: 10000
    youtubePlaylistLoadLimit: 100
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  lavasrc:
    sources:
      spotify: true
      applemusic: true
      deezer: true
      yandexmusic: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID:}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET:}"
      countryCode: "US"
    applemusic:
      countryCode: "US"
    deezer:
      masterDecryptionKey: "${DEEZER_MASTER_KEY:}"
    yandexmusic:
      accessToken: "${YANDEX_ACCESS_TOKEN:}"

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
